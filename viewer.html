<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monster Name Comparison</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #4f8cff;
      --boss: #e85d5d;
      --mob: #5cb87a;
      --highlight: #3d4f6a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem;
    }

    header { margin-bottom: 1.5rem; }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 1rem;
    }

    .search-wrap {
      flex: 1;
      min-width: 220px;
    }

    input[type="search"] {
      width: 100%;
      padding: 0.65rem 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-size: 0.95rem;
    }

    input[type="search"]:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    select {
      padding: 0.65rem 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-size: 0.9rem;
    }

    .result-count {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 0.75rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    thead {
      background: #243044;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    th, td {
      padding: 0.65rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }

    th {
      font-weight: 600;
      color: var(--muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    tbody tr:hover { background: var(--highlight); }

    .badge {
      display: inline-block;
      padding: 0.15rem 0.55rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .badge.boss {
      background: rgba(232, 93, 93, 0.2);
      color: var(--boss);
    }

    .badge.mob {
      background: rgba(92, 184, 122, 0.2);
      color: var(--mob);
    }

    .id-col {
      font-family: Consolas, monospace;
      color: var(--muted);
    }

    .missing {
      color: var(--muted);
      font-style: italic;
    }

    .name-changed {
      color: #f0c674;
    }

    .level-col {
      font-family: Consolas, monospace;
      color: var(--muted);
      text-align: center;
      width: 4rem;
    }

    .level-changed {
      color: #f0c674;
    }

    .empty {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
    }

    .error {
      background: rgba(232, 93, 93, 0.15);
      border: 1px solid var(--boss);
      border-radius: 8px;
      padding: 1rem;
      color: var(--boss);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Monster Name Comparison</h1>

      <select id="typeFilter">

        <option value="boss">Boss only</option>
        <option value="mob">Mob only</option>

      <select id="nameFilter">

        <option value="changed">Name changed</option>
        <option value="same">Name unchanged</option>
        <option value="missing">Missing new name</option>
      </select>
    </div>

    <p class="result-count" id="resultCount"></p>
    <div id="tableWrap"></div>
  </div>

  <script>
    let allMonsters = [];

    function renderTable(monsters) {
      const wrap = document.getElementById("tableWrap");
      const countEl = document.getElementById("resultCount");
      countEl.textContent = `Showing ${monsters.length.toLocaleString()} of ${allMonsters.length.toLocaleString()} monsters`;

      if (!monsters.length) {
        wrap.innerHTML = '<div class="empty">No monsters match your search.</div>';
        return;
      }

      const rows = monsters.map(m => {
        const nameChanged = m.newName && m.newName !== m.originalName;
        const levelChanged = m.newLevel && m.originalLevel !== m.newLevel;
        const newNameClass = !m.newName ? "missing" : nameChanged ? "name-changed" : "";
        const newLevelClass = levelChanged ? "level-changed" : "";
        const newNameText = m.newName || "(not in str_monster.xml)";
        return `<tr>
          <td class="id-col">${m.id}</td>
          <td class="id-col">${m.sprite}</td>
          <td><span class="badge ${m.type}">${m.type}</span></td>
          <td>${escapeHtml(m.originalName)}</td>
          <td class="level-col">${escapeHtml(m.originalLevel || "—")}</td>
          <td class="${newNameClass}">${escapeHtml(newNameText)}</td>
          <td class="level-col ${newLevelClass}">${escapeHtml(m.newLevel || "—")}</td>
        </tr>`;
      }).join("");

      wrap.innerHTML = `<table>
        <thead>
          <tr>
            <th>ID (編號)</th>
            <th>Sprite (圖號)</th>
            <th>Type</th>
            <th>Original Name</th>
            <th>Orig. Level (等級)</th>
            <th>New Name</th>
            <th>New Level (等級)</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
    }

    function escapeHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function applyFilters() {
      const query = document.getElementById("search").value.trim().toLowerCase();
      const type = document.getElementById("typeFilter").value;
      const nameFilter = document.getElementById("nameFilter").value;

      const filtered = allMonsters.filter(m => {
        if (type !== "all" && m.type !== type) return false;

        if (nameFilter === "changed" && (!m.newName || m.newName === m.originalName)) return false;
        if (nameFilter === "same" && m.newName !== m.originalName) return false;
        if (nameFilter === "missing" && m.newName) return false;

        if (!query) return true;
        return m.originalName.toLowerCase().includes(query) ||
               (m.newName && m.newName.toLowerCase().includes(query));
      });

      renderTable(filtered);
    }

    async function loadData() {
      if (window.MONSTER_DATA) return window.MONSTER_DATA;
      const res = await fetch("matched_monsters.json");
      if (!res.ok) throw new Error("Run build_comparison.ps1 first to generate matched_monsters.json");
      return res.json();
    }

    async function init() {
      try {
        const data = await loadData();
        allMonsters = data.monsters;
        renderTable(allMonsters);

        document.getElementById("search").addEventListener("input", applyFilters);
        document.getElementById("typeFilter").addEventListener("change", applyFilters);
        document.getElementById("nameFilter").addEventListener("change", applyFilters);
      } catch (err) {
        document.getElementById("tableWrap").innerHTML =
          `<div class="error">${escapeHtml(err.message)}</div>`;
      }
    }

    init();
  </script>
